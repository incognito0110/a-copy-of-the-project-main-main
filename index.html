<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
        const commentsListEl = document.querySelector('.comments');
    const nameInputEl = document.querySelector('.add-form-name');
    const textInputEl = document.querySelector('.add-form-text');
    const addFormButtonEl = document.querySelector('.add-form-button');
    
    let nameValue = "";
    let commentValue = "";

    nameInputEl.addEventListener("input", () => {
  nameValue = nameInputEl.value;
  nameInputEl.classList.remove("-invalid");
});

    textInputEl.addEventListener("input", () => {
  commentValue = textInputEl.value;
  textInputEl.classList.remove("-invalid");
    });

    
addFormButtonEl.addEventListener("click", () => {
  const trimmedName = nameValue.trim();
  const trimmedComment = commentValue.trim();

  nameInputEl.classList.remove("-invalid");
  textInputEl.classList.remove("-invalid");

  if (!trimmedName || !trimmedComment) {
    if (!trimmedName) nameInputEl.classList.add("-invalid");
    if (!trimmedComment) textInputEl.classList.add("-invalid");
    return;
  }

const now = new Date().toLocaleString("ru-RU", {
  day: "2-digit",
  month: "2-digit",
  year: "2-digit",
  hour: "2-digit",
  minute: "2-digit",
  hour12: false,
}).replace(",", "");

const newCommentHtml = `
  <li class="comment">
          <div class="comment-header">
            <div>${trimmedName}</div>
            <div>${now}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              ${trimmedComment}
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">0</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
`;

commentsListEl.innerHTML += newCommentHtml;

nameValue = "";
commentValue = "";
nameInputEl.value = "";
textInputEl.value = "";
});

commentsListEl.addEventListener("click", (event) => {
  const likeButtonEl = event.target.closest(".like-button");

  if (!likeButtonEl) {
    return;
  }

  const likesContainerEl = likeButtonEl.closest(".likes");
  const likesCounterEl = likesContainerEl.querySelector(".likes-counter");
  const currentLikes = Number(likesCounterEl.textContent);
  const isLiked = likeButtonEl.classList.contains("-active-like");

  if (isLiked) {
    likeButtonEl.classList.remove("-active-like");
    likesCounterEl.textContent = String(Math.max(0, currentLikes - 1));
  } else {
    likeButtonEl.classList.add("-active-like");
    likesCounterEl.textContent = String(currentLikes + 1);
  }
});

  </script>
</html>
